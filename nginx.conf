# ========================================
# CONFIGURAÇÃO NGINX - SEGURANÇA
# ========================================
# Cole este conteúdo em seu arquivo de configuração nginx
# Geralmente em: /etc/nginx/sites-available/seu-dominio

upstream app {
    server localhost:3000;
    keepalive 64;
}

# Redirecionar HTTP para HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name seu-dominio.com www.seu-dominio.com;
    
    return 301 https://$server_name$request_uri;
}

# Servidor HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name seu-dominio.com www.seu-dominio.com;

    # ========================================
    # CERTIFICADOS SSL/TLS
    # ========================================
    ssl_certificate /etc/letsencrypt/live/seu-dominio.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/seu-dominio.com/privkey.pem;
    
    # Configurações SSL recomendadas
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # ========================================
    # SECURITY HEADERS
    # ========================================
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' cdnjs.cloudflare.com fonts.googleapis.com; style-src 'self' 'unsafe-inline' cdnjs.cloudflare.com fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' fonts.gstatic.com cdnjs.cloudflare.com; connect-src 'self' https://wa.me;" always;

    # ========================================
    # LOGGING
    # ========================================
    access_log /var/log/nginx/seu-dominio.access.log;
    error_log /var/log/nginx/seu-dominio.error.log;

    # ========================================
    # RATE LIMITING
    # ========================================
    limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=contact:10m rate=2r/m;
    
    limit_req zone=general burst=20 nodelay;

    # ========================================
    # OCULTAR VERSÃO DO NGINX
    # ========================================
    server_tokens off;

    # ========================================
    # PROXY REVERSO PARA APLICAÇÃO NODE.JS
    # ========================================
    location / {
        proxy_pass http://app;
        proxy_http_version 1.1;
        
        # Headers de proxy
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ========================================
    # RATE LIMITING PARA CONTATO
    # ========================================
    location /contact {
        limit_req zone=contact burst=5 nodelay;
        proxy_pass http://app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ========================================
    # BLOQUEAR ACESSO A ARQUIVOS SENSÍVEIS
    # ========================================
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ========================================
    # CACHE DE ARQUIVOS ESTÁTICOS
    # ========================================
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff|woff2|ttf|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ========================================
    # COMPRESSÃO GZIP
    # ========================================
    gzip on;
    gzip_types text/plain text/css text/javascript application/json application/javascript application/x-javascript;
    gzip_min_length 1024;
    gzip_proxied any;
}
